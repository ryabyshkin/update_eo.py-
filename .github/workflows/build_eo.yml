name: Обновление ЕО

on:
  push:
    paths:
      - 'data/**.xlsx'   # Запускается только когда меняются xlsx в папке data/

jobs:
  update-eo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v4

      - name: Установка Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Установка зависимостей
        run: pip install pandas openpyxl

      - name: Запуск скрипта обновления
        run: python update_eo.py

      - name: Коммит и пуш обновлённого ЕО
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/EO_updated.xlsx
          git commit -m "Auto: обновление ЕО $(date +'%d.%m.%Y %H:%M')" || echo "Нет изменений"
          git push
